services:
  - type: web
    name: sentinelflow-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RUN_WORKER_IN_API
        value: true
      - key: MIGRATE_ON_STARTUP
        value: true
      - key: DATABASE_URL
        sync: false
      - key: WEB_ORIGIN
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_APP_SLUG
        sync: false
      - key: GITHUB_APP_PRIVATE_KEY
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: SCAN_REPO_ALLOWLIST
        sync: false
