services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sentinelflow
      POSTGRES_PASSWORD: sentinelflow
      POSTGRES_DB: sentinelflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinelflow -d sentinelflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - sentinelflow-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  sentinelflow-postgres:
